<!DOCTYPE html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00C853" />
    <title>BuatCuan Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Plus Jakarta Sans", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07130d;
        color: #f4f4f5;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 0%, rgba(0, 200, 83, 0.24), transparent 34%),
          linear-gradient(135deg, #07130d, #101010 64%, #061f12);
      }
      main {
        width: min(420px, 100%);
        border: 1px solid rgba(0, 200, 83, 0.32);
        border-radius: 20px;
        background: rgba(15, 23, 18, 0.92);
        padding: 24px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }
      img {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
        line-height: 1.15;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        font-size: 14px;
        line-height: 1.65;
        font-weight: 600;
      }
      a, button {
        margin-top: 20px;
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border: 0;
        border-radius: 14px;
        background: #00c853;
        color: #07130d;
        padding: 0 18px;
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/buatcuan-mark.svg" alt="BuatCuan" />
      <h1>Koneksi sedang offline</h1>
      <p>Beberapa halaman BuatCuan butuh koneksi untuk mengambil progress, materi, tools, dan komisi terbaru. Coba lagi setelah internet tersambung.</p>
      <button type="button" onclick="window.location.reload()">Coba lagi</button>
    </main>
  </body>
</html>
